name: Deploy Pages

on:
  push:
    branches: ["main"]

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - run: |
          npm install
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist   # IMPORTANT: adjust if needed

      - uses: actions/deploy-pages@v5
